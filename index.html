<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TU/GRUERO · Centro de Control</title>
<link href="https://fonts.cdnfonts.com/css/coolvetica" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #F27730;
    --black: #161819;
    --bg: #ffffff;
    --bg2: #f7f7f7;
    --border: #e8e8e8;
    --border2: #d4d4d4;
    --text: #111;
    --text-mid: #555;
    --text-muted: #999;
    --font-display: 'Coolvetica', 'Bebas Neue', Impact, sans-serif;
    --font-body: 'Roboto', Arial, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  /* ── PAGE HEADER ── */
    .page-header {
    padding: 28px 32px 0;
  }

  .page-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .page-title {
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.01em;
  }

  .page-date {
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
  }

  .datetime-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 5px 12px;
    border-radius: 6px;
  }

  .dt-sep {
    color: var(--border2);
  }

  /* ── TABS ── */
  .tabs {
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-top: 16px;
  }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: default;
    transition: all 0.15s;
  }

  .tab-btn {
    cursor: pointer;
  }

  .tab-btn:hover {
    color: var(--text);
    background: var(--bg2);
    border-radius: 6px 6px 0 0;
  }

  .tab.active {
    color: var(--text);
    font-weight: 700;
    border-bottom-color: var(--orange);
  }

  .tab-icon { font-size: 15px; }

  /* ── MAIN ── */
  main {
    flex: 1;
    padding: 32px 32px 48px;
  }

  /* ── SECTION LABEL ── */
  .section-label {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  /* ── CARDS ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 24px 20px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    transition: all 0.18s ease;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--orange);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.22s ease;
  }

  .card:hover {
    border-color: var(--border2);
    box-shadow: 0 4px 16px rgba(0,0,0,0.07);
    transform: translateY(-2px);
  }

  .card:hover::before { transform: scaleX(1); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .card-icon {
    width: 40px; height: 40px;
    background: #fff5ee;
    border: 1px solid #ffe0ca;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .card-num {
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--border2);
    transition: color 0.15s;
  }

  .card:hover .card-num { color: var(--orange); }

  .card-name {
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }

  .card-desc {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    line-height: 1.6;
    flex: 1;
  }

  .card-footer {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-tag {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .card-cta {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    transition: color 0.15s;
  }

  .card:hover .card-cta { color: var(--orange); }

  .arrow {
    display: inline-block;
    transition: transform 0.2s;
  }

  .card:hover .arrow { transform: translateX(4px); }

  /* ── ANIMATIONS ── */
  .card {
    opacity: 0;
    transform: translateY(8px);
    animation: up 0.4s ease forwards;
  }

  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.12s; }
  .card:nth-child(3) { animation-delay: 0.19s; }

  @keyframes up { to { opacity: 1; transform: translateY(0); } }

  /* ── FOOTER ── */
  footer {
    padding: 14px 32px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg2);
  }

  .footer-left {
    font-size: 11px;
    color: var(--text-muted);
  }

  .footer-badge {
    background: var(--orange);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 4px;
  }
</style>
</head>
